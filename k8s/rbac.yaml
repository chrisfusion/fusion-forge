---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fusion-forge
  namespace: fusion
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fusion-forge-role
  namespace: fusion
rules:
  # Forge creates and monitors build Jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Forge reads pod status and logs of builder pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Forge creates/deletes requirements.txt ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fusion-forge-binding
  namespace: fusion
subjects:
  - kind: ServiceAccount
    name: fusion-forge
    namespace: fusion
roleRef:
  kind: Role
  name: fusion-forge-role
  apiGroup: rbac.authorization.k8s.io
---
# Builder pods: no K8s API permissions needed — they only call index-backend over the network
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fusion-forge-builder
  namespace: fusion
  annotations:
    description: "Used by venv builder pods. No K8s API permissions."
