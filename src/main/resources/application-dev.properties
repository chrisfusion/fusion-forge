# Dev overrides — apply when running with mvn quarkus:dev
quarkus.hibernate-orm.log.sql=true
quarkus.datasource.devservices.enabled=true

# Disable OIDC in dev; use FORGE_DEV_TOKEN instead
quarkus.oidc.enabled=false

# Point to a locally port-forwarded index-backend
quarkus.rest-client.index-backend.url=http://localhost:18080

# Use a local builder image tag
forge.builder.image=fusion-venv-builder:local
forge.k8s.namespace=fusion
