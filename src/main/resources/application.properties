# Application
quarkus.application.name=fusion-forge
quarkus.http.port=8080

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:fusion}
quarkus.datasource.password=${DB_PASSWORD:fusion}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fusion_forge}

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# REST client — index-backend registry
quarkus.rest-client.index-backend.url=http://${INDEX_BACKEND_HOST:index-backend.fusion.svc.cluster.local}:${INDEX_BACKEND_PORT:8080}
# Shared URL used by the builder pod env var — must match the REST client URL
forge.index-backend.url=${quarkus.rest-client.index-backend.url}
quarkus.rest-client.index-backend.scope=jakarta.inject.Singleton
quarkus.rest-client.index-backend.connect-timeout=5000
quarkus.rest-client.index-backend.read-timeout=30000

# OIDC
quarkus.oidc.enabled=${OIDC_ENABLED:true}
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://keycloak.fusion.svc.cluster.local:8080/realms/fusion}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:fusion-forge}
quarkus.oidc.application-type=service
# Non-proactive: auth is checked only when endpoint requires it
quarkus.http.auth.proactive=false

# Dev token override — set FORGE_DEV_TOKEN env var; empty = disabled
# WARNING: never set in production deployments
forge.dev-token=${FORGE_DEV_TOKEN:}

# Kubernetes
forge.k8s.namespace=${K8S_NAMESPACE:fusion}
forge.k8s.job.ttl-seconds-after-finished=86400
forge.k8s.job.backoff-limit=0
forge.builder.image=${BUILDER_IMAGE:ghcr.io/fusion-platform/venv-builder:latest}

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Validation rules — path to forge-rules.yaml; empty = use classpath default
forge.validation.rules-file=${FORGE_RULES_FILE:}

# Logging
quarkus.log.level=INFO
quarkus.log.category."fusion.forge".level=DEBUG
