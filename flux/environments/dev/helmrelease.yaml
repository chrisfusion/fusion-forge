# Development environment — internal PostgreSQL, auth disabled.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fusion-forge
  namespace: dev-fusion
spec:
  interval: 10m
  targetNamespace: dev-fusion
  chart:
    spec:
      chart: fusion-forge
      # Always install the highest published semver chart version.
      version: ">=0.0.0"
      sourceRef:
        kind: HelmRepository
        name: fusion-platform
        namespace: flux-system
      interval: 10m
  install:
    createNamespace: false
  upgrade:
    cleanupOnFail: true
  values:
    namespace: dev-fusion
    createNamespace: false

    imagePullSecrets:
      - name: registry-credentials  # pre-existing secret in dev-fusion

    server:
      image:
        repository: registry.example.com/fusion/fusion-forge  # TODO
        tag: "0.1.0" # {"$imagepolicy": "flux-system:fusion-forge:tag"}
        pullPolicy: IfNotPresent
      config:
        k8sNamespace: dev-fusion
        builderImage: registry.example.com/fusion/fusion-venv-builder:0.1.0 # {"$imagepolicy": "flux-system:fusion-venv-builder:tag"}
        indexBackendURL: http://fusion-index-backend.dev-fusion.svc.cluster.local:8080
        authEnabled: "false"

    operator:
      image:
        repository: registry.example.com/fusion/fusion-forge  # TODO
        tag: "0.1.0" # {"$imagepolicy": "flux-system:fusion-forge:tag"}
        pullPolicy: IfNotPresent

    postgresql:
      enabled: true
      auth:
        database: fusion_forge
        username: fusion
        password: "fusion"  # dev only — use existingSecret for staging/prod
      persistence:
        enabled: true
        size: 2Gi
