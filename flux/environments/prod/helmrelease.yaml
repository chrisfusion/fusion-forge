# Production environment — external PostgreSQL, auth enabled, higher resource limits.
# Pre-requisite: create the DB credentials secret before the first Helm install:
#   kubectl create secret generic fusion-forge-db-secret \
#     --from-literal=password=<password> \
#     -n prod-fusion
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fusion-forge
  namespace: prod-fusion
spec:
  interval: 10m
  targetNamespace: prod-fusion
  chart:
    spec:
      chart: fusion-forge
      # Always install the highest published semver chart version.
      version: ">=0.0.0"
      sourceRef:
        kind: HelmRepository
        name: fusion-platform
        namespace: flux-system
      interval: 10m
  install:
    createNamespace: false
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    namespace: prod-fusion
    createNamespace: false

    imagePullSecrets:
      - name: registry-credentials  # pre-existing secret in prod-fusion

    server:
      replicas: 2
      image:
        repository: registry.example.com/fusion/fusion-forge  # TODO
        tag: "0.1.0" # {"$imagepolicy": "flux-system:fusion-forge:tag"}
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 500m
          memory: 256Mi
        limits:
          cpu: "2"
          memory: 512Mi
      config:
        k8sNamespace: prod-fusion
        builderImage: registry.example.com/fusion/fusion-venv-builder:0.1.0 # {"$imagepolicy": "flux-system:fusion-venv-builder:tag"}
        indexBackendURL: http://fusion-index-backend.prod-fusion.svc.cluster.local:8080
        authEnabled: "true"
        authAllowedSAs: ""  # TODO: "prod-fusion/your-service-account"

    operator:
      image:
        repository: registry.example.com/fusion/fusion-forge  # TODO
        tag: "0.1.0" # {"$imagepolicy": "flux-system:fusion-forge:tag"}
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 200m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 256Mi

    postgresql:
      enabled: false
      external:
        host: postgres-prod.example.com  # TODO
        port: 5432
        database: fusion_forge
        username: fusion
        existingSecret: fusion-forge-db-secret  # must exist in prod-fusion
