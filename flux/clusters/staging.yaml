# Apply this file to the staging cluster after Flux bootstrap:
#   kubectl apply -f flux/clusters/staging.yaml
# Or pass --path=flux/clusters/staging during flux bootstrap (see flux/README.md).
---
# Shared sources: HelmRepository, ImageRepository, ImagePolicy, ImageUpdateAutomation.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fusion-forge-sources
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/sources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# Staging environment: Namespace + HelmRelease for dev-staging-fusion.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fusion-forge-staging
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/environments/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: fusion-forge-sources
