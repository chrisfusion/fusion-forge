# Apply this file to the production cluster after Flux bootstrap:
#   kubectl apply -f flux/clusters/prod.yaml
# Or pass --path=flux/clusters/prod during flux bootstrap (see flux/README.md).
---
# Shared sources: HelmRepository, ImageRepository, ImagePolicy, ImageUpdateAutomation.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fusion-forge-sources
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/sources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# Production environment: Namespace + HelmRelease for prod-fusion.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fusion-forge-prod
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/environments/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: fusion-forge-sources
