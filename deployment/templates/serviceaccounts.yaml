# ServiceAccount for the REST server — creates CIBuild CRs and reads pod logs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fusion-forge.serverSAName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
automountServiceAccountToken: true
---
# ServiceAccount for the operator — manages CIBuild CRs, Jobs, and ConfigMaps.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fusion-forge.operatorSAName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
automountServiceAccountToken: true
---
# ServiceAccount for builder pods — no K8s API permissions needed.
# imagePullSecrets are attached here so builder Jobs can pull from private registries
# without requiring changes to the CIBuild CR spec or jobbuilder.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fusion-forge.builderSAName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: builder
  annotations:
    description: "Used by CI builder pods. No K8s API permissions."
automountServiceAccountToken: false
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
