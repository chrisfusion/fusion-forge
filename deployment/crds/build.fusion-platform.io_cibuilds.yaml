---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: cibuilds.build.fusion-platform.io
spec:
  group: build.fusion-platform.io
  names:
    kind: CIBuild
    listKind: CIBuildList
    plural: cibuilds
    shortNames:
    - cib
    singular: cibuild
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.artifactName
      name: Artifact
      type: string
    - jsonPath: .spec.artifactVersion
      name: Version
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CIBuild represents an asynchronous artifact build executed as
          a Kubernetes Job.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              CIBuildSpec defines the desired state of a CIBuild.
              ConfigData holds arbitrary filename→content pairs that are mounted as a ConfigMap
              volume at /workspace inside the builder pod. This keeps the spec generic so future
              build types can supply different sets of input files.
            properties:
              artifactName:
                description: ArtifactName is the logical name of the artifact being
                  built (for display).
                type: string
              artifactVersion:
                description: ArtifactVersion is the semver version string of the artifact
                  being built (for display).
                type: string
              builderImage:
                description: BuilderImage is the container image used to execute the
                  build.
                type: string
              configData:
                additionalProperties:
                  type: string
                description: |-
                  ConfigData holds filename→content pairs mounted as a ConfigMap volume at /workspace.
                  For venv builds this contains "requirements.txt".
                type: object
              description:
                description: Description is a human-readable description of the artifact.
                type: string
              env:
                description: |-
                  Env contains additional environment variables injected into the builder pod.
                  The operator always injects INDEX_BACKEND_URL from spec; Env carries build-specific
                  vars such as ARTIFACT_ID and ARTIFACT_VERSION.
                items:
                  description: EnvVar represents an environment variable present in
                    a Container.
                  properties:
                    name:
                      description: Name of the environment variable. Must be a C_IDENTIFIER.
                      type: string
                    value:
                      description: |-
                        Variable references $(VAR_NAME) are expanded
                        using the previously defined environment variables in the container and
                        any service environment variables. If a variable cannot be resolved,
                        the reference in the input string will be unchanged. Double $$ are reduced
                        to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                        "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                        Escaped references will never be expanded, regardless of whether the variable
                        exists or not.
                        Defaults to "".
                      type: string
                    valueFrom:
                      description: Source for the environment variable's value. Cannot
                        be used if value is not empty.
                      properties:
                        configMapKeyRef:
                          description: Selects a key of a ConfigMap.
                          properties:
                            key:
                              description: The key to select.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the ConfigMap or its key
                                must be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                        fieldRef:
                          description: |-
                            Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                            spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                          properties:
                            apiVersion:
                              description: Version of the schema the FieldPath is
                                written in terms of, defaults to "v1".
                              type: string
                            fieldPath:
                              description: Path of the field to select in the specified
                                API version.
                              type: string
                          required:
                          - fieldPath
                          type: object
                          x-kubernetes-map-type: atomic
                        resourceFieldRef:
                          description: |-
                            Selects a resource of the container: only resources limits and requests
                            (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                          properties:
                            containerName:
                              description: 'Container name: required for volumes,
                                optional for env vars'
                              type: string
                            divisor:
                              anyOf:
                              - type: integer
                              - type: string
                              description: Specifies the output format of the exposed
                                resources, defaults to "1"
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            resource:
                              description: 'Required: resource to select'
                              type: string
                          required:
                          - resource
                          type: object
                          x-kubernetes-map-type: atomic
                        secretKeyRef:
                          description: Selects a key of a secret in the pod's namespace
                          properties:
                            key:
                              description: The key of the secret to select from.  Must
                                be a valid secret key.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the Secret or its key must
                                be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                  required:
                  - name
                  type: object
                type: array
              indexBackendURL:
                description: IndexBackendURL is the base URL of the fusion-index artifact
                  registry.
                type: string
            required:
            - artifactName
            - artifactVersion
            - builderImage
            - configData
            - indexBackendURL
            type: object
          status:
            description: CIBuildStatus reflects the live state of a CIBuild.
            properties:
              completedAt:
                description: CompletedAt is when the build reached a terminal phase.
                format: date-time
                type: string
              configMapName:
                description: |-
                  ConfigMapName is the name of the ConfigMap holding the build inputs.
                  Cleared after the build reaches a terminal phase.
                type: string
              jobName:
                description: JobName is the name of the batch/v1 Job created for this
                  build.
                type: string
              message:
                description: Message holds a human-readable status detail or failure
                  reason.
                type: string
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - Building
                - Succeeded
                - Failed
                type: string
              startedAt:
                description: StartedAt is when the build Job was first submitted.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
